<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basquete Recreio</title>
    <link rel="shortcut icon" type="image/x-icon" href="https://www.recreiodajuventude.com.br/oficial/2023/application/modules/comum/assets/img/icon/favicon.ico">
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="ns">
    <fieldset class="box">
        <form class="form" action="" method="get">
            <label for="nome">Nome</label>
            <input type="name" name="nome" id="nome" placeholder="Nome" required>    

            <div id="gen">
                <input type="radio" name="genero" id="masculino" value="masculino">
                <label for="masculino">Masculino</label>
                <input type="radio" name="genero" id="feminino" value="feminino">
                <label for="feminino">Feminino</label>    
            </div>
            
            <label for="idade">Idade</label>
            <input type="number" name="idade" id="idade" placeholder="Idade" required>

            <label for="nasc">Data de Nasc.</label>
            <input type="date" name="nasc" id="nasc" placeholder="Data de Nasc."required>

            <label for="email">Email </label>
            <input type="email" name="email" id="email" placeholder="Email" required>

            <label for="tel">Telefone</label>
            <input type="tel" name="tel" id="tel" pattern="[0-9]{11}" placeholder="Digite com DDD e sem espaço" required>

            <label for="posicao">Posição</label>
            <select name="posicao" id="posicao">
                <option disabled selected hidden>Selecione...</option>
                <option value="pg">Armador</option>
                <option value="sg">Ala-armador</option>
                <option value="sf">Ala</option>
                <option value="pf">Ala-pivô</option>
                <option value="c">Pivô</option>
            </select>
            <button type="submit">Enviar formulário</button>
        </form>
    </fieldset>
</body>
</html>
